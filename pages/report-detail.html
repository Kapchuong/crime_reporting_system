<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Details - Crime Reporting System</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #f5f7fa; }
        .report-detail-container { max-width: 900px; margin: 2rem auto; padding: 2rem; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .btn-back { background: #6c757d; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; text-decoration: none; display: inline-block; margin-bottom: 2rem; }
        .btn-back:hover { background: #545b62; }
        
        .report-header { border-bottom: 2px solid #f0f0f0; padding-bottom: 1rem; margin-bottom: 2rem; }
        .report-title { font-size: 1.8rem; color: #333; margin-bottom: 0.5rem; }
        .report-meta { display: flex; flex-wrap: wrap; gap: 1rem; color: #666; font-size: 0.9rem; }
        
        .report-section { margin-bottom: 2rem; }
        .section-title { font-size: 1.2rem; color: #333; margin-bottom: 1rem; border-bottom: 1px solid #eee; padding-bottom: 0.5rem; }
        
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .detail-item { margin-bottom: 1rem; }
        .detail-label { font-weight: 500; color: #555; margin-bottom: 0.25rem; }
        .detail-value { color: #333; }
        
        .status-badge, .priority-badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: 500; display: inline-block; }
        .status-pending { background: #fff3e0; color: #f57c00; }
        .status-investigating { background: #e3f2fd; color: #1976d2; }
        .status-resolved { background: #e8f5e8; color: #388e3c; }
        .status-closed { background: #f8d7da; color: #721c24; }
        .priority-high { background: #fce4e4; color: #d32f2f; }
        .priority-medium { background: #fff3e0; color: #f57c00; }
        .priority-low { background: #e8f5e8; color: #388e3c; }
        
        .timeline { border-left: 3px solid #007bff; padding-left: 1rem; }
        .timeline-item { margin-bottom: 1rem; padding: 1rem; background: #f8f9fa; border-radius: 6px; }
        .timeline-date { font-size: 0.8rem; color: #666; margin-bottom: 0.5rem; }
        
        .evidence-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; margin-top: 1rem; }
        .evidence-item { position: relative; border-radius: 5px; overflow: hidden; aspect-ratio: 1; cursor: pointer; }
        .evidence-item img, .evidence-item video { width: 100%; height: 100%; object-fit: cover; }
        
        .loading { text-align: center; padding: 2rem; color: #666; }
        .error { text-align: center; padding: 2rem; color: #dc3545; }
        
        @media (max-width: 768px) { .detail-grid { grid-template-columns: 1fr; } .report-meta { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="report-detail-container">
        <button class="btn-back" onclick="goBack()"><i class="fas fa-arrow-left"></i> Back to Dashboard</button>
        <div id="reportContent"><div class="loading">Loading report details...</div></div>
    </div>
    
    <script>
        // ============ FIREBASE CONFIGURATION (ADDED DIRECTLY) ============
        const firebaseConfig = {
            apiKey: "AIzaSyCr9f1gTrP5nTEJ9RHg-vIpEQQRH_Dm96E",
            authDomain: "crime-reporting-system-939aa.firebaseapp.com",
            projectId: "crime-reporting-system-939aa",
            storageBucket: "crime-reporting-system-939aa.firebasestorage.app",
            messagingSenderId: "890706417373",
            appId: "1:890706417373:web:22b6aaf7f074aec231ad34"
        };
        
        // Initialize Firebase if not already initialized
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
            console.log('Firebase initialized successfully');
        }
        
        // ============ SAFE DATE FORMATTING FUNCTIONS ============
        function safeFormatDate(dateValue) {
            if (!dateValue) return 'N/A';
            if (dateValue.toDate && typeof dateValue.toDate === 'function') {
                return dateValue.toDate().toLocaleDateString();
            }
            if (dateValue instanceof Date) {
                return dateValue.toLocaleDateString();
            }
            try {
                return new Date(dateValue).toLocaleDateString();
            } catch (e) {
                return 'Invalid Date';
            }
        }
        
        function safeFormatDateTime(dateValue) {
            if (!dateValue) return 'N/A';
            if (dateValue.toDate && typeof dateValue.toDate === 'function') {
                return dateValue.toDate().toLocaleString();
            }
            if (dateValue instanceof Date) {
                return dateValue.toLocaleString();
            }
            try {
                return new Date(dateValue).toLocaleString();
            } catch (e) {
                return 'Invalid Date';
            }
        }
        
        function toJSDate(dateValue) {
            if (!dateValue) return new Date();
            if (dateValue.toDate && typeof dateValue.toDate === 'function') {
                return dateValue.toDate();
            }
            if (dateValue instanceof Date) {
                return dateValue;
            }
            return new Date(dateValue);
        }
        
        let currentUser = null;
        let db = firebase.firestore();
        
        function getReportId() { 
            return new URLSearchParams(window.location.search).get('id'); 
        }
        
        async function loadReportDetails() {
            const reportId = getReportId();
            if (!reportId) { 
                document.getElementById('reportContent').innerHTML = '<div class="error">Report ID not found</div>'; 
                return; 
            }
            
            try {
                const reportDoc = await db.collection('reports').doc(reportId).get();
                if (!reportDoc.exists) { 
                    document.getElementById('reportContent').innerHTML = '<div class="error">Report not found</div>'; 
                    return; 
                }
                
                const report = { id: reportDoc.id, ...reportDoc.data() };
                console.log('Report loaded:', report);
                
                // Get timeline
                const timelineSnapshot = await db.collection('reports').doc(reportId).collection('timeline').orderBy('createdAt', 'desc').get();
                const timeline = [];
                timelineSnapshot.forEach(doc => timeline.push({ id: doc.id, ...doc.data() }));
                
                displayReportDetails(report, timeline);
            } catch (error) {
                console.error('Error loading report details:', error);
                document.getElementById('reportContent').innerHTML = `<div class="error">Error loading report: ${error.message}</div>`;
            }
        }
        
        function displayReportDetails(report, timeline) {
            // Safe date conversion for createdAt
            const createdAt = toJSDate(report.createdAt);
            
            // Safe date conversion for incidentDate
            let incidentDate = null;
            if (report.incidentDate) {
                incidentDate = toJSDate(report.incidentDate);
            }
            
            // Handle evidence display
            let evidenceHtml = '';
            if (report.evidence && Array.isArray(report.evidence) && report.evidence.length > 0) {
                const validEvidence = report.evidence.filter(e => e && e.url);
                if (validEvidence.length > 0) {
                    evidenceHtml = `<div class="report-section">
                        <h2 class="section-title">Evidence (${validEvidence.length} files)</h2>
                        <div class="evidence-grid">
                            ${validEvidence.map(e => {
                                const isImage = e.type && e.type.startsWith('image/');
                                return `<div class="evidence-item" onclick="viewEvidence('${e.url}')">
                                    ${isImage ? `<img src="${e.url}" alt="Evidence" onerror="this.src='https://via.placeholder.com/150?text=Image+Not+Available'">` : 
                                    `<video><source src="${e.url}"></video><i class="fas fa-play" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: white; font-size: 2rem;"></i>`}
                                </div>`;
                            }).join('')}
                        </div>
                    </div>`;
                } else {
                    evidenceHtml = `<div class="report-section"><h2 class="section-title">Evidence</h2><p>No valid evidence files.</p></div>`;
                }
            } else {
                evidenceHtml = `<div class="report-section"><h2 class="section-title">Evidence</h2><p>No evidence uploaded for this report.</p></div>`;
            }
            
            // Build timeline HTML
            let timelineHtml = '';
            if (timeline && timeline.length > 0) {
                timelineHtml = `<div class="report-section">
                    <h2 class="section-title">Timeline</h2>
                    <div class="timeline">
                        ${timeline.map(item => {
                            const itemDate = toJSDate(item.createdAt);
                            return `<div class="timeline-item">
                                <div class="timeline-date">${safeFormatDateTime(itemDate)}</div>
                                <div><strong>${escapeHtml(item.type || 'Update')}</strong></div>
                                ${item.note ? `<div>${escapeHtml(item.note)}</div>` : ''}
                                ${item.officerName ? `<div><small>By: ${escapeHtml(item.officerName)}</small></div>` : ''}
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
            }
            
            const content = `
                <div class="report-header">
                    <h1 class="report-title">Report #${report.id.slice(0, 8)}</h1>
                    <div class="report-meta">
                        <span><i class="fas fa-calendar"></i> ${safeFormatDateTime(createdAt)}</span>
                        <span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(report.location || 'Unknown')}</span>
                        <span class="status-badge status-${report.status || 'pending'}">${(report.status || 'pending').toUpperCase().replace('_', ' ')}</span>
                        <span class="priority-badge priority-${report.priority || 'low'}">${(report.priority || 'low').toUpperCase()}</span>
                    </div>
                </div>
                
                <div class="report-section">
                    <h2 class="section-title">Incident Details</h2>
                    <div class="detail-grid">
                        <div class="detail-item">
                            <div class="detail-label">Incident Type</div>
                            <div class="detail-value">${escapeHtml(report.incidentType || 'N/A')}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Location</div>
                            <div class="detail-value">${escapeHtml(report.location || 'N/A')}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Date & Time of Incident</div>
                            <div class="detail-value">${incidentDate ? safeFormatDateTime(incidentDate) : 'N/A'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Reporter</div>
                            <div class="detail-value">${escapeHtml(report.userName || report.reporterName || 'Anonymous')}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Assigned To</div>
                            <div class="detail-value">${escapeHtml(report.assignedTo || 'Not assigned')}</div>
                        </div>
                    </div>
                </div>
                
                <div class="report-section">
                    <h2 class="section-title">Description</h2>
                    <p>${escapeHtml(report.description || 'No description provided')}</p>
                </div>
                
                ${report.suspectInfo ? `<div class="report-section">
                    <h2 class="section-title">Suspect Information</h2>
                    <p>${escapeHtml(report.suspectInfo)}</p>
                </div>` : ''}
                
                ${evidenceHtml}
                
                ${timelineHtml}
            `;
            document.getElementById('reportContent').innerHTML = content;
        }
        
        window.viewEvidence = function(url) { 
            window.open(url, '_blank'); 
        };
        
        function goBack() {
            const userRole = localStorage.getItem('userRole');
            if (userRole === 'police') window.location.href = 'police-dashboard.html';
            else if (userRole === 'admin') window.location.href = 'admin-dashboard.html';
            else window.location.href = 'citizen-dashboard.html';
        }
        
        function escapeHtml(text) { 
            if (!text) return ''; 
            const div = document.createElement('div'); 
            div.textContent = text; 
            return div.innerHTML; 
        }
        
        function showToast(msg, type = 'info') {
            const toast = document.createElement('div');
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.right = '20px';
            toast.style.backgroundColor = type === 'error' ? '#dc3545' : '#28a745';
            toast.style.color = 'white';
            toast.style.padding = '12px 20px';
            toast.style.borderRadius = '8px';
            toast.style.zIndex = '9999';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Initialize
        firebase.auth().onAuthStateChanged(async (user) => {
            if (!user) { 
                window.location.href = 'login.html'; 
                return; 
            }
            currentUser = user;
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (userDoc.exists) {
                    localStorage.setItem('userRole', userDoc.data().role);
                }
            } catch (error) {
                console.error('Error getting user role:', error);
            }
            await loadReportDetails();
        });
    </script>
</body>
</html>
