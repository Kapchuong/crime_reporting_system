<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Crime Reporting System</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
 
     <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
        
    <script src="../js/firebase-config.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .auth-container { width: 100%; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: white; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 100%; max-width: 450px; padding: 2.5rem; }
        .auth-header { text-align: center; margin-bottom: 2rem; }
        .auth-header i { font-size: 3rem; color: #dc3545; margin-bottom: 1rem; }
        .auth-header h2 { color: #1e3c72; margin-bottom: 0.5rem; }
        .auth-header p { color: #6c757d; }
        
        .form-group { margin-bottom: 1.5rem; position: relative; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #2c3e50; font-weight: 500; }
        .form-group input { width: 100%; padding: 0.75rem; border: 2px solid #e0e0e0; border-radius: 5px; font-size: 1rem; transition: all 0.3s; }
        .form-group input:focus { outline: none; border-color: #1e3c72; }
        
        .password-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666; }
        .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .checkbox-container { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .forgot-password { color: #1e3c72; text-decoration: none; }
        .forgot-password:hover { text-decoration: underline; }
        
        .btn-auth { width: 100%; padding: 1rem; background: #1e3c72; color: white; border: none; border-radius: 5px; font-size: 1rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.3s; }
        .btn-auth:hover { background: #2a5298; }
        .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .auth-footer { text-align: center; margin-top: 1.5rem; color: #6c757d; }
        .auth-footer a { color: #1e3c72; text-decoration: none; font-weight: 600; }
        .error-message { background: #f8d7da; color: #721c24; padding: 0.75rem; border-radius: 5px; margin-top: 1rem; text-align: center; display: none; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; border-radius: 10px; max-width: 400px; width: 90%; }
        .modal-header { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; border-radius: 10px 10px 0 0; }
        .modal-body { padding: 20px; }
        .modal-footer { padding: 15px 20px; border-top: 1px solid #eee; display: flex; justify-content: flex-end; gap: 10px; background: #f8f9fa; border-radius: 0 0 10px 10px; }
        .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #666; }
        .btn-primary { background: #007bff; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .btn-secondary { background: #6c757d; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header"><i class="fas fa-shield-alt"></i><h2>Welcome Back</h2><p>Login to access the crime reporting system</p></div>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group"><label for="email">Email Address</label><input type="email" id="email" name="email" required placeholder="Enter your email"></div>
                <div class="form-group"><label for="password">Password</label><input type="password" id="password" name="password" required placeholder="Enter your password"><i class="fas fa-eye password-toggle" onclick="togglePassword()"></i></div>
                <div class="form-options"><label class="checkbox-container"><input type="checkbox" id="rememberMe"><span class="checkmark"></span>Remember me</label><a href="#" class="forgot-password" onclick="showForgotPasswordModal(); return false;">Forgot Password?</a></div>
                <button type="submit" class="btn-auth" id="loginBtn"><i class="fas fa-sign-in-alt"></i>Login</button>
            </form>
            
            <div class="auth-footer"><p>Don't have an account? <a href="register.html">Register here</a></p></div>
            <div id="errorMessage" class="error-message"></div>
        </div>
    </div>
    
    <div id="forgotPasswordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3><i class="fas fa-key"></i> Reset Password</h3><button class="modal-close" onclick="closeForgotPasswordModal()">&times;</button></div>
            <div class="modal-body"><p>Enter your email address and we'll send you a link to reset your password.</p><div class="form-group"><input type="email" id="resetEmail" placeholder="Your email address"></div></div>
            <div class="modal-footer"><button class="btn-secondary" onclick="closeForgotPasswordModal()">Cancel</button><button class="btn-primary" id="sendResetBtn">Send Reset Link</button></div>
        </div>
    </div>
    
    <script>
        function togglePassword() {
            const passwordField = document.getElementById('password');
            const icon = event.currentTarget;
            if (passwordField.type === 'password') { passwordField.type = 'text'; icon.classList.remove('fa-eye'); icon.classList.add('fa-eye-slash'); }
            else { passwordField.type = 'password'; icon.classList.remove('fa-eye-slash'); icon.classList.add('fa-eye'); }
        }
        
        function showForgotPasswordModal() { document.getElementById('forgotPasswordModal').style.display = 'flex'; }
        function closeForgotPasswordModal() { document.getElementById('forgotPasswordModal').style.display = 'none'; document.getElementById('resetEmail').value = ''; }
        
        function sendPasswordReset() {
            const email = document.getElementById('resetEmail').value;
            const sendBtn = document.getElementById('sendResetBtn');
            if (!email) { alert('Please enter your email address'); return; }
            sendBtn.disabled = true; sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
            firebase.auth().sendPasswordResetEmail(email).then(() => { alert('Password reset email sent! Check your inbox.'); closeForgotPasswordModal(); })
                .catch((error) => { let message = 'Error sending reset email'; if (error.code === 'auth/user-not-found') message = 'No account found with this email address'; else if (error.code === 'auth/invalid-email') message = 'Please enter a valid email address'; alert(message); })
                .finally(() => { sendBtn.disabled = false; sendBtn.innerHTML = 'Send Reset Link'; });
        }
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const loginBtn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMessage');
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            errorDiv.style.display = 'none';
            
            try {
                const persistence = rememberMe ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION;
                await firebase.auth().setPersistence(persistence);
                const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                const userDoc = await firebase.firestore().collection('users').doc(user.uid).get();
                if (userDoc.exists) {
                    const userData = userDoc.data();
                    await firebase.firestore().collection('users').doc(user.uid).update({ lastLogin: firebase.firestore.FieldValue.serverTimestamp() });
                    
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirect = urlParams.get('redirect');
                    if (redirect === 'emergency' && userData.role === 'citizen') { window.location.href = 'report-crime.html?emergency=true'; }
                    else {
                        if (userData.role === 'citizen') window.location.href = 'citizen-dashboard.html';
                        else if (userData.role === 'police') window.location.href = 'police-dashboard.html';
                        else if (userData.role === 'admin') window.location.href = 'admin-dashboard.html';
                        else window.location.href = '../index.html';
                    }
                } else {
                    await firebase.firestore().collection('users').doc(user.uid).set({
                        email: user.email, fullName: user.displayName || 'User', role: 'citizen',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        lastLogin: firebase.firestore.FieldValue.serverTimestamp(), isActive: true
                    });
                    window.location.href = 'citizen-dashboard.html';
                }
            } catch (error) {
                console.error('Login error:', error);
                let errorMessage = 'An error occurred. Please try again.';
                if (error.code === 'auth/user-not-found') errorMessage = 'No account found with this email. Please register first.';
                else if (error.code === 'auth/wrong-password') errorMessage = 'Incorrect password. Please try again.';
                else if (error.code === 'auth/invalid-email') errorMessage = 'Please enter a valid email address.';
                else if (error.code === 'auth/too-many-requests') errorMessage = 'Too many failed attempts. Please try again later.';
                errorDiv.textContent = errorMessage;
                errorDiv.style.display = 'block';
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        });
        
        document.getElementById('sendResetBtn').onclick = sendPasswordReset;
        
        window.onclick = function(event) { if (event.target.classList.contains('modal')) event.target.style.display = 'none'; };
    </script>
</body>
</html>
